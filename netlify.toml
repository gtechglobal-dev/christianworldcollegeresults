[build]
  command = "npm run build"
  publish = "frontend/dist"

[functions]
  directory = "backend/netlify/functions"
  included_files = ["backend/node_modules/.prisma/client/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
